name: Deploy API (thin) to Cloud Run
on:
  push:
    branches: [main]
env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: europe-west9
  REPO_NAME: autopostule-repo

jobs:
  deploy-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'
      - run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Build & push THIN image
        run: |
          IMG="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/api:${{ github.sha }}"
          docker build -f Dockerfile -t $IMG .       # thin Dockerfile (no Chromium binary)
          docker push $IMG

      - name: Deploy autopostule-api
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: autopostule-api
          region: ${{ env.REGION }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/api:${{ github.sha }}
          flags: >-
            --allow-unauthenticated
            --service-account=autopostule-runtime@${{ env.PROJECT_ID }}.iam.gserviceaccount.com
            --cpu=1 --memory=1Gi
            --concurrency=80
            --min-instances=1 --max-instances=10
            --timeout=900
          env_vars: |
            APP_ROLE=api
            AGENT_DISPATCH_MODE=cloud_run_job
            AGENT_JOB_REGION=europe-west9
            AGENT_JOB_NAME=autopostule-agent
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            DATABASE_DIRECT_URL=${{ secrets.DATABASE_DIRECT_URL }}
            STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}
            STRIPE_API_KEY=${{ secrets.STRIPE_API_KEY }}
            REPOSITORY_TYPE=${{ secrets.REPOSITORY_TYPE }}
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            BASIC_PRICE_ID=${{ secrets.BASIC_PRICE_ID }}
            PREMIUM_PRICE_ID=${{ secrets.PREMIUM_PRICE_ID }}
            ENCRYPTION_KEY=${{ secrets.ENCRYPTION_KEY }}
            GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}
            GCP_RESUME_BUCKET=${{ secrets.GCP_RESUME_BUCKET }}
            REDIS_URL=${{ secrets.REDIS_URL }}
            RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
            FRONTEND_URL=${{ secrets.FRONTEND_URL }}
            EMAIL_FROM=${{ secrets.EMAIL_FROM }}
            IPROYAL_HOST=${{ secrets.IPROYAL_HOST }}
            IPROYAL_PORT=${{ secrets.IPROYAL_PORT }}
            IPROYAL_USERNAME=${{ secrets.IPROYAL_USERNAME }}
            IPROYAL_PASSWORD_TEMPLATE=${{ secrets.IPROYAL_PASSWORD_TEMPLATE }}
            PROXY_PROVIDER=${{ secrets.PROXY_PROVIDER }}
            ENV=${{ secrets.ENV }}
            TURNSTILE_SECRET_KEY=${{ secrets.TURNSTILE_SECRET_KEY }}
