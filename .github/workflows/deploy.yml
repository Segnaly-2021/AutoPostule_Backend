name: Deploy Backend to Cloud Run

# This tells GitHub to run this script EVERY time you push to the 'main' branch
on:
  push:
    branches:
      - main

# Define our variables
env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: europe-west9
  REPO_NAME: autopostule-repo
  SERVICE_NAME: autopostule-api

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Download your code onto the GitHub runner server
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Authenticate to Google Cloud using your secret JSON key
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      # 3. Log into your Artifact Registry vault in Paris
      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      # 4. Build the Docker container and push it to the vault
      - name: Build and Push Docker Image
        run: |
          IMAGE_PATH="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          
          # Build it
          docker build -t $IMAGE_PATH .
          
          # Push it
          docker push $IMAGE_PATH

      # 5. Tell Cloud Run to launch the new container and inject the secrets!
      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          flags: '--allow-unauthenticated'
          env_vars: |
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            STRIPE_WEBHOOK_SECRET=${{ secrets.STRIPE_WEBHOOK_SECRET }}
            STRIPE_API_KEY=${{ secrets.STRIPE_API_KEY }}
            REPOSITORY_TYPE=${{ secrets.REPOSITORY_TYPE }}
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            BASIC_PRICE_ID=${{ secrets.BASIC_PRICE_ID }}
            PREMIUM_PRICE_ID=${{ secrets.PREMIUM_PRICE_ID }}
            ENCRYPTION_KEY=${{ secrets.ENCRYPTION_KEY }}
            GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}
            GCP_RESUME_BUCKET=${{ secrets.GCP_RESUME_BUCKET }}
            GCP_CREDENTIALS=${{ secrets.GCP_CREDENTIALS}}
            